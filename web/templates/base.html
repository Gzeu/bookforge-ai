<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BookForge AI{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/app.js" defer></script>
  <style>
    .gradient-text {
      background: linear-gradient(135deg, #f97316, #fb923c, #fdba74);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card-hover { transition: transform .2s, box-shadow .2s; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(249,115,22,.2); }
  </style>
</head>
<body class="min-h-screen bg-base-100">

<!-- Navbar -->
<div class="navbar bg-base-200 border-b border-base-300 px-6">
  <div class="flex-1">
    <a href="/" class="flex items-center gap-2">
      <span class="text-2xl">📚</span>
      <span class="font-bold text-xl gradient-text">BookForge AI</span>
    </a>
  </div>
  <div class="flex-none gap-2">
    <a href="/" class="btn btn-ghost btn-sm">Generate</a>
    <a href="/research" class="btn btn-ghost btn-sm">Niche Research</a>
    <a href="https://github.com/Gzeu/bookforge-ai" target="_blank"
       class="btn btn-ghost btn-sm">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                 -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                 .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                 -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                 .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                 .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8
                 c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
  </div>
</div>

<!-- Main content -->
<main class="container mx-auto px-4 py-8 max-w-5xl">
  {% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="footer footer-center p-4 bg-base-200 text-base-content border-t border-base-300 mt-12">
  <p class="text-sm opacity-60">
    BookForge AI v1.1.0 &mdash; Powered by
    <a href="https://github.com/iLearn-Lab/NovelClaw" class="link link-hover">NovelClaw</a>
    &mdash; MIT License
  </p>
</footer>

</body>
</html>
